<!DOCTYPE html>
<html lang="en-us">
	<head>
		<meta charset="utf-8">
			<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
				<title>Unity Web Player | Dodgeballin'</title>

				<style>
					html,
					body {
					width: 100%;
					min-height: 100%;
					margin: 0;
					padding: 0;
					background: #000;
					overflow: hidden;
					}

					body {
					display: flex;
					justify-content: center;
					align-items: center;
					min-height: 100vh;
					overflow: hidden;
					}

					#unity-canvas {
					width: 450px;
					height: 800px;
					display: block;
					box-sizing: border-box;
					border: 6px solid #00EFFF;
					background: url("Build/Dodgeballin-Web.jpg") center / cover;
					}

					@media (max-width: 450px), (max-height: 800px) {
					#unity-canvas {
					width: auto;
					height: auto;
					max-width: 100vw;
					max-height: 100vh;
					}
					}
				</style>
			</head>

	<body>
		<canvas
		  id="unity-canvas"
		  width="450"
		  height="800"
		  tabindex="-1">
		</canvas>

		<script src="Build/Dodgeballin-Web.loader.js"></script>

		<script>
			const canvas = document.querySelector("#unity-canvas");

			if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
			const meta = document.createElement("meta");
			meta.name = "viewport";
			meta.content =
			"width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";

			document.head.appendChild(meta);

			canvas.style.width = "100%";
			canvas.style.height = "100%";
			canvas.style.position = "fixed";
			canvas.style.inset = "0";
			}

			createUnityInstance(canvas, {
			arguments: [],
			dataUrl: "Build/Dodgeballin-Web.data",
			frameworkUrl: "Build/Dodgeballin-Web.framework.js",
			codeUrl: "Build/Dodgeballin-Web.wasm",
			streamingAssetsUrl: "StreamingAssets",
			companyName: "CamCo Games",
			productName: "Dodgeballin'",
			productVersion: "1.4"
			}).catch((message) => {
			alert(message);
			});
		</script>
	</body>
</html>
