<!DOCTYPE html>
<html lang="en-us">
	<head>
		<meta charset="utf-8">
			<meta
			  http-equiv="Content-Type"
			  content="text/html; charset=utf-8"
  >

				<meta
				  name="viewport"
				  content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes"
  >

					<title>Unity Web Player | Dodgeballin'</title>

					<style>
						* {
						box-sizing: border-box;
						}

						html,
						body {
						width: 100%;
						height: 100%;
						margin: 0;
						padding: 0;
						border: 0;
						overflow: hidden;
						background: #000;
						}

						body {
						display: flex;
						justify-content: center;
						align-items: center;
						}

						#game-container {
						position: relative;
						width: 450px;
						height: 800px;
						flex: 0 0 450px;

						border: 6px solid #00EFFF;
						overflow: hidden;
						background: #000;
						}

						#unity-canvas {
						display: block;
						width: 450px;
						height: 800px;
						margin: 0;
						padding: 0;
						border: 0;

						background:
						url("Build/Dodgeballin-Web.jpg")
						center / cover
						no-repeat;
						}

						@media (max-width: 600px), (max-height: 850px) {
						body {
						display: block;
						}

						#game-container {
						position: fixed;
						inset: 0;

						width: 100%;
						height: 100%;
						max-width: none;
						max-height: none;
						flex: none;

						border: 6px solid #00EFFF;
						}

						#unity-canvas {
						width: 100%;
						height: 100%;
						}
						}
					</style>
				</head>

	<body>
		<div id="game-container">
			<canvas
			  id="unity-canvas"
			  width="450"
			  height="800"
			  tabindex="-1"
    ></canvas>
		</div>

		<script src="Build/Dodgeballin-Web.loader.js"></script>

		<script>
			const canvas = document.querySelector("#unity-canvas");

			createUnityInstance(canvas, {
			arguments: [],
			dataUrl: "Build/Dodgeballin-Web.data",
			frameworkUrl: "Build/Dodgeballin-Web.framework.js",
			codeUrl: "Build/Dodgeballin-Web.wasm",
			streamingAssetsUrl: "StreamingAssets",
			companyName: "CamCo Games",
			productName: "Dodgeballin'",
			productVersion: "1.4"

			// These remain unchanged:
			// matchWebGLToCanvasSize: false,
			// devicePixelRatio: 1
			})
			.then((unityInstance) => {
			})
			.catch((message) => {
			alert(message);
			});
		</script>
	</body>
</html>
